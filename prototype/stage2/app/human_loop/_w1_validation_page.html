<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>W1 Validation Page</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      .stack { display: grid; gap: 12px; max-width: 640px; }
      label { display: grid; gap: 6px; font-size: 14px; }
      iframe { width: 100%; height: 160px; border: 1px solid #ccc; }
      button { width: 160px; height: 36px; }
    </style>
  </head>
  <body>
    <div class="stack">
      <label>
        姓名
        <input id="nameInput" name="name" placeholder="请输入姓名" />
      </label>
      <label>
        类型
        <select id="typeSelect" name="type">
          <option value="">请选择</option>
          <option value="alpha">Alpha</option>
          <option value="beta">Beta</option>
        </select>
      </label>
      <button id="saveButton" type="button">保存</button>
      <iframe
        id="childFrame"
        name="childFrame"
        srcdoc="<!doctype html><html><body><label>子页备注<input id='frameInput' name='frameRemark' placeholder='请输入子页备注' /></label></body></html>"
      ></iframe>
    </div>
  </body>
</html>
